spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/canslim
    username: canslim_user
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: NextpickPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 DDL 관리, JPA는 검증만
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

logging:
  level:
    com.nextpick: INFO
    org.springframework: WARN
