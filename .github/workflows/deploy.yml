name: Deploy to EC2

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'etl/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/nextpick
            # git 강제 동기화 — 로컬 변경/충돌로 pull이 조용히 실패해 옛 소스로 빌드되던 것 방지.
            git fetch origin master
            git reset --hard origin/master
            echo "배포 커밋: $(git log -1 --oneline)"
            # --build로 재빌드 + --force-recreate로 컨테이너 강제 재생성(옛 jar 잔존 방지).
            docker compose -f docker-compose.prod.yml up --build -d --force-recreate backend
            echo "Backend deployed at $(date)"
