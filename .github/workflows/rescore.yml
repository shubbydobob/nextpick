name: Rescore now (manual)

# 점수 즉시 복구 — 기존 financials/price로 정규화→파생→채점만 재실행.
# 아무것도 삭제하지 않음 (전부 재계산/upsert). DART 재수집(run_daily)과 무관하게 동작.
on:
  workflow_dispatch:
    inputs:
      score_date:
        description: "채점 기준일 YYYY-MM-DD (비우면 오늘)"
        type: string
        default: ""

jobs:
  rescore:
    name: Recompute derived metrics + score
    runs-on: ubuntu-latest
    steps:
      - name: Run via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/ubuntu/nextpick

            D="${{ inputs.score_date }}"
            PYDATE="date.today()"
            if [ -n "$D" ]; then PYDATE="date.fromisoformat('$D')"; fi

            echo "===== [1/3] financial_normalizer (C/A: eps) ====="
            PYTHONUTF8=1 .venv/bin/python -c "from datetime import date; from etl.kr_adapter.financial_normalizer import normalize_all; normalize_all($PYDATE)"

            echo "===== [2/3] derived_metrics_calculator (L: rs_percentile, N, S) ====="
            PYTHONUTF8=1 .venv/bin/python -c "from datetime import date; from etl.kr_adapter.derived_metrics_calculator import calculate; print('updated rows:', calculate($PYDATE))"

            echo "===== [3/3] 채점 트리거 ====="
            curl -s -S -X POST --max-time 900 http://localhost:8080/api/admin/scoring/run || echo "(scoring 트리거 실패)"
            echo ""

            echo "===== 결과 확인: 최신 채점일 점수 건강도 ====="
            docker exec nextpick-postgres psql -U nextpick_user -d nextpick -A -t -c "SELECT score_date, count(*) total, count(*) FILTER (WHERE c_score IS NOT NULL) c_ok, count(*) FILTER (WHERE a_score IS NOT NULL) a_ok, count(*) FILTER (WHERE l_score IS NOT NULL) l_ok, count(*) FILTER (WHERE i_score IS NOT NULL) i_ok FROM nextpick_scores WHERE score_date=(SELECT max(score_date) FROM nextpick_scores) GROUP BY score_date;"
