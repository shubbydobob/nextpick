name: DB status (manual)

# 운영 DB 상태 진단 — 읽기 전용. 테이블별 row 수 + 가격 이력 충분 종목 수 + 최신 거래일.
on:
  workflow_dispatch:

jobs:
  status:
    name: Inspect production DB
    runs-on: ubuntu-latest
    steps:
      - name: Query DB via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 3m
          script: |
            PSQL="docker exec canslim-postgres psql -U canslim_user -d canslim -A -t"

            echo "===== 테이블별 row 수 ====="
            $PSQL -c "SELECT relname, n_live_tup FROM pg_stat_user_tables ORDER BY n_live_tup DESC;"

            echo "===== price_daily: 종목당 이력 분포 ====="
            $PSQL -c "SELECT count(*) AS tickers_total, count(*) FILTER (WHERE d > 200) AS ge_200d, count(*) FILTER (WHERE d > 20) AS ge_20d FROM (SELECT security_id, count(*) d FROM price_daily GROUP BY security_id) s;" 2>&1 || echo "(price_daily 조회 실패)"

            echo "===== price_daily 최신 거래일 ====="
            $PSQL -c "SELECT max(trade_date) FROM price_daily;" 2>&1 || echo "(조회 실패)"

            echo "===== canslim_scores 최신 채점일 + 건수 ====="
            $PSQL -c "SELECT score_date, count(*) FROM canslim_scores GROUP BY score_date ORDER BY score_date DESC LIMIT 3;" 2>&1 || echo "(조회 실패)"

            echo "===== 최신 채점일 점수 건강도 (값이 진짜인지) ====="
            $PSQL -c "SELECT count(*) total, round(avg(composite_score)::numeric,1) avg_comp, min(composite_score) mn, max(composite_score) mx, count(DISTINCT composite_score) distinct_comp, count(*) FILTER (WHERE c_score IS NULL) c_null, count(*) FILTER (WHERE a_score IS NULL) a_null, count(*) FILTER (WHERE l_score IS NULL) l_null, count(*) FILTER (WHERE i_score IS NULL) i_null FROM canslim_scores WHERE score_date=(SELECT max(score_date) FROM canslim_scores);" 2>&1 || echo "(조회 실패)"

            echo "===== 종합점수 분포 (percentile + 구간별 종목수) ====="
            $PSQL -c "SELECT round(percentile_cont(0.5) WITHIN GROUP (ORDER BY composite_score)::numeric,1) AS median, round(percentile_cont(0.9) WITHIN GROUP (ORDER BY composite_score)::numeric,1) AS p90, round(percentile_cont(0.99) WITHIN GROUP (ORDER BY composite_score)::numeric,1) AS p99, max(composite_score) AS mx FROM canslim_scores WHERE score_date=(SELECT max(score_date) FROM canslim_scores);" 2>&1 || echo "(실패)"
            $PSQL -c "SELECT width_bucket(composite_score, 0, 100, 10)*10 AS band, count(*) FROM canslim_scores WHERE score_date=(SELECT max(score_date) FROM canslim_scores) GROUP BY band ORDER BY band;" 2>&1 || echo "(실패)"
            echo "===== 팩터별 평균 (전 종목) ====="
            $PSQL -c "SELECT round(avg(c_score)::numeric,1) c, round(avg(a_score)::numeric,1) a, round(avg(n_score)::numeric,1) n, round(avg(s_score)::numeric,1) s, round(avg(l_score)::numeric,1) l, round(avg(i_score)::numeric,1) i, round(avg(m_score)::numeric,1) m FROM canslim_scores WHERE score_date=(SELECT max(score_date) FROM canslim_scores);" 2>&1 || echo "(실패)"

            echo "===== derived_metrics 최신 as_of_date + 파생 null 분포 ====="
            $PSQL -c "SELECT max(as_of_date) FROM derived_metrics;" 2>&1 || echo "(실패)"
            $PSQL -c "SELECT count(*) total, count(*) FILTER (WHERE rs_percentile IS NOT NULL) rs_ok, count(*) FILTER (WHERE eps_qoq_yoy_pct IS NOT NULL) c_ok, count(*) FILTER (WHERE eps_3yr_cagr IS NOT NULL) a_ok, count(*) FILTER (WHERE inst_net_buy_10d IS NOT NULL) i_ok FROM derived_metrics WHERE as_of_date=(SELECT max(as_of_date) FROM derived_metrics);" 2>&1 || echo "(실패)"

            echo "===== DART 재수집 진행률 (오늘 target) ====="
            $PSQL -c "SELECT status, count(*) FROM ingestion_meta WHERE source_name LIKE 'DART_FIN_KR_%' AND target_date=CURRENT_DATE GROUP BY status;" 2>&1 || echo "(실패)"
            $PSQL -c "SELECT count(*) FROM ingestion_meta WHERE source_name LIKE 'DART_FIN_KR_%' AND status='SUCCESS';" 2>&1 || echo "(실패)"

            echo "===== 서버에서 도는 ETL 프로세스 ====="
            ps -eo pid,etime,cmd | grep -E "run_daily|run_backfill|dart_loader" | grep -v grep || echo "(파이썬 ETL 프로세스 없음)"

            echo "===== 백필 로그 마지막 8줄 ====="
            tail -n 8 /home/ubuntu/canslim/backfill_10yr.log 2>&1 || echo "(로그 없음)"

            echo "===== etl_daily 로그 마지막 15줄 ====="
            tail -n 15 /home/ubuntu/canslim/etl_daily.log 2>&1 || echo "(로그 없음)"
