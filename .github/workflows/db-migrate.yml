name: DB migrate (manual)

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'SQL file to run (relative to repo root)'
        required: true
        default: 'db/migrate_v3_price_snapshot.sql'

jobs:
  migrate:
    name: Run migration SQL
    runs-on: ubuntu-latest
    steps:
      - name: Run SQL via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /home/ubuntu/nextpick
            git stash --include-untracked 2>/dev/null || true
            git pull --ff-only

            echo "===== Running: ${{ github.event.inputs.script }} ====="
            docker exec -i nextpick-postgres \
              psql -U nextpick_user -d nextpick < "${{ github.event.inputs.script }}"
            echo "===== Done ====="

            echo "===== Verify: nextpick_scores columns ====="
            docker exec nextpick-postgres \
              psql -U nextpick_user -d nextpick -A -t -c \
              "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='nextpick_scores' AND column_name IN ('close_price','prev_close','change_rate','volume','turnover','market_cap') ORDER BY column_name;"

            echo "===== Verify: rows with price data ====="
            docker exec nextpick-postgres \
              psql -U nextpick_user -d nextpick -A -t -c \
              "SELECT count(*) AS total, count(*) FILTER (WHERE close_price IS NOT NULL) AS has_price FROM nextpick_scores WHERE score_date=(SELECT max(score_date) FROM nextpick_scores);"
