name: KIS TR probe (manual, read-only)

# 프로그램매매·시간외 TR 후보를 운영 EC2에서 실호출해 rt_cd/필드를 로그로 확인.
# DB를 건드리지 않는 읽기 전용 진단 — 정확한 TR/필드/단위 확정 후 로더를 작성하기 위함.
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "진단 종목코드"
        type: string
        default: "005930"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /home/ubuntu/canslim
            TICKER="${{ inputs.ticker }}" PYTHONUTF8=1 .venv/bin/python - <<'PY'
            import os, re, json, requests
            from etl.kr_adapter.investor_flow_loader import _load_config, _get_token, _BASE_URL
            cfg = _load_config(); token = _get_token(cfg)
            arg = os.environ.get("TICKER", "005930")
            # 6자리 숫자가 아니면 종목명으로 보고 DB에서 ticker 조회
            if re.match(r'^\d{6}$', arg):
                ticker = arg
            else:
                from etl.shared.db_writer import get_session
                from sqlalchemy import text
                with get_session() as s:
                    row = s.execute(text("SELECT ticker, name FROM instruments WHERE name LIKE :n ORDER BY length(name) LIMIT 1"),
                                    {"n": f"%{arg}%"}).fetchone()
                    ticker = row.ticker if row else arg
                    print(f"종목명 '{arg}' → ticker={ticker} ({row.name if row else '없음'})")

            def probe(label, tr, path, params):
                h = {"content-type":"application/json; charset=utf-8",
                     "authorization": f"Bearer {token}", "appkey": cfg["app_key"],
                     "appsecret": cfg["app_secret"], "tr_id": tr, "custtype": "P"}
                try:
                    r = requests.get(_BASE_URL + path, headers=h, params=params, timeout=10)
                    j = r.json()
                    print(f"\n=== {label} | TR={tr} | HTTP={r.status_code} | rt_cd={j.get('rt_cd')} | msg={j.get('msg1')}")
                    out = j.get("output") or j.get("output1") or j.get("output2")
                    if isinstance(out, list): out = out[:2]
                    print(json.dumps(out, ensure_ascii=False)[:2500])
                except Exception as e:
                    print(f"\n=== {label} | TR={tr} | ERROR {e}")

            # 넥스트레이드(NXT) 통합 시세 확인 — 시장구분 J(KRX)/UN(통합)/NX(넥스트) 현재가 비교
            for mkt in ["J", "UN", "NX"]:
                def one(label, tr, path, p):
                    h = {"content-type":"application/json; charset=utf-8",
                         "authorization": f"Bearer {token}", "appkey": cfg["app_key"],
                         "appsecret": cfg["app_secret"], "tr_id": tr, "custtype": "P"}
                    try:
                        r = requests.get(_BASE_URL + path, headers=h, params=p, timeout=10)
                        j = r.json(); o = j.get("output") or {}
                        print(f"=== {label} mkt={mkt} rt_cd={j.get('rt_cd')} msg={j.get('msg1')} "
                              f"prpr={o.get('stck_prpr')} sdpr(기준가)={o.get('stck_sdpr')} "
                              f"vrss={o.get('prdy_vrss')} ctrt={o.get('prdy_ctrt')} vol={o.get('acml_vol')} "
                              f"stat={o.get('iscd_stat_cls_code')} rprs_mrkt={o.get('rprs_mrkt_kor_name')}")
                    except Exception as e:
                        print(f"=== {label} mkt={mkt} ERROR {e}")
                one("현재가", "FHKST01010100", "/uapi/domestic-stock/v1/quotations/inquire-price",
                    {"fid_cond_mrkt_div_code": mkt, "fid_input_iscd": ticker})
            PY

            echo ""
            echo "===== 운영 백엔드 실제 응답 (localhost:8080/api/realtime/quotes) ====="
            curl -s "http://localhost:8080/api/realtime/quotes?tickers=${{ inputs.ticker }}" | head -c 1000
            echo ""
            echo "===== 백엔드 컨테이너 최근 시작 시각 (배포 반영 확인) ====="
            docker ps --format '{{.Names}} | {{.Status}}' | grep -i backend || true
